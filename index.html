<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<ul id="show"></ul>
    

<script>


let names = ['ali', 'usman', 'umer', 'wajid', 'irfan']
let show = document.getElementById('show')

render()

function render (){
show.innerHTML= ``
for(let i=0; i<names.length; i++){
    show.innerHTML +=`<li data-list="${i}">${names[i]} <button class='del'>Del</button></li>`
}}

show.addEventListener('click', del)

function del(e){
    // console.log(e.target);
    if(e.target.classList.contains('del')){
        let index = e.target.parentElement.getAttribute('data-list')
        names.splice(index, 1)
        render()
    }
}

</script>
</body>
</html>
